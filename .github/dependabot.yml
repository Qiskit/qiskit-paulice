version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    labels: ["dependencies"]
    schedule:
      interval: "weekly"
  - package-ecosystem: "pip"
    directory: "/"
    labels: ["dependencies"]
    versioning-strategy: increase
    schedule:
      interval: "monthly"
  - package-ecosystem: "cargo"
    directory: "/"
    labels: ["dependencies"]
    schedule:
      interval: "monthly"
